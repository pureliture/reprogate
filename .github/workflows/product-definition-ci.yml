name: product-definition-ci

on:
  pull_request:
    branches: [ master, main ]

jobs:
  validate-product-definition:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Collect changed files
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed_files.txt
          cat changed_files.txt

      - name: Save PR body
        run: |
          # Use single-quoted heredoc for safety against shell interpolation
          cat <<'EOF' > pr_body.md
          ${{ github.event.pull_request.body }}
          EOF

      - name: Validate product definition workflow
        run: |
          uv run python3 scripts/validate_product_definition.py \
            --changed-file-list changed_files.txt \
            --pr-body-file pr_body.md
