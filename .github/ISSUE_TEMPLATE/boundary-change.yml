name: Boundary Change
description: In/Out scope, core contract, entry mode, scenario boundary 변경
title: "[boundary] "
labels: ["boundary", "needs-triage"]
body:
  - type: input
    id: affected_docs
    attributes:
      label: Affected Docs
      description: 예) docs/strategy/product-boundary.md, docs/strategy/scenarios.md
    validations:
      required: true

  - type: textarea
    id: current_boundary
    attributes:
      label: Current Boundary
    validations:
      required: true

  - type: textarea
    id: proposed_boundary
    attributes:
      label: Proposed Boundary
    validations:
      required: true

  - type: textarea
    id: scenarios
    attributes:
      label: Affected Scenarios
      description: 관련 SC-* ID
    validations:
      required: true
