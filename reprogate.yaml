# ReproGate Configuration
project_name: "ReproGate"
reprogate_version: "1.0.0"

# Record storage
records_dir: "records"
record_types:
  adr:
    dir: "adr"
    prefix: "ADR"
    required_sections: ["Context", "Decision", "Consequences", "Verification"]
  rfc:
    dir: "rfc"
    prefix: "RFC"
    required_sections: ["Summary", "Design / Proposal", "Verification"]

# Skill definitions
skills_dir: "skills"
active_skills:
  - record-required
  - decision-documented
  - scope-defined
  - verification-present

# Gatekeeper behavior
gatekeeper:
  engine: "opa"
  strict_mode: true
  fail_closed: true
